<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>

  <script>
    (function () {
      var path = window.location.pathname;

      // Preserve query string and hash
      var redirect =
        "/?route=" +
        encodeURIComponent(
          path + window.location.search + window.location.hash
        );

      window.location.replace(redirect);
    })();
  </script>
</head>

<body>
  Redirecting...
</body>
</html>
